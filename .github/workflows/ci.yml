name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/docker-mvp

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and production build
        run: npm run verify

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/weera-fmg-preview.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/weera-fmg-preview.log
          exit 1

      - name: Run browser smoke test
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173/
        run: npm run smoke:browser

      - name: Upload smoke artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: tmp/smoke
          if-no-files-found: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t weera-fmg:ci .
